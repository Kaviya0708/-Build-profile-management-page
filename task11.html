<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Management Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:800px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.profile-header{
    text-align:center;
    margin-bottom:30px;
}

.profile-header img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid #667eea;
}

.profile-header h2{
    margin-top:10px;
    color:#333;
}

.profile-header p{
    color:gray;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    outline:none;
}

input:focus,
textarea:focus{
    border-color:#667eea;
}

textarea{
    resize:none;
    height:100px;
}

.btn-container{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.save-btn{
    background:#28a745;
}

.reset-btn{
    background:#dc3545;
}

button:hover{
    opacity:0.9;
}

.profile-info{
    margin-top:25px;
    background:#f4f4f4;
    padding:15px;
    border-radius:10px;
}

.profile-info h3{
    color:#667eea;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="profile-header">
        <img src="https://via.placeholder.com/120" id="profilePic">
        <h2>Profile Management</h2>
        <p>Manage Your Personal Information</p>
    </div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter Name">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter Email">
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="Enter Phone Number">
    </div>

    <div class="form-group">
        <label>Address</label>
        <textarea id="address" placeholder="Enter Address"></textarea>
    </div>

    <div class="btn-container">
        <button class="save-btn" onclick="saveProfile()">Save Profile</button>
        <button class="reset-btn" onclick="resetProfile()">Reset</button>
    </div>

    <div class="profile-info" id="output">
        <h3>Saved Profile Details</h3>
        <p>No profile data saved yet.</p>
    </div>

</div>

<script>
function saveProfile() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    document.getElementById("output").innerHTML = `
        <h3>Saved Profile Details</h3>
        <p><strong>Name:</strong> ${name}</p>
        <p><strong>Email:</strong> ${email}</p>
        <p><strong>Phone:</strong> ${phone}</p>
        <p><strong>Address:</strong> ${address}</p>
    `;

    alert("Profile Saved Successfully!");
}

function resetProfile() {
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("address").value = "";

    document.getElementById("output").innerHTML = `
        <h3>Saved Profile Details</h3>
        <p>No profile data saved yet.</p>
    `;
}
</script>

</body>
</html>
